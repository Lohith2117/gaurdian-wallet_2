<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardianWallet 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .flagged { color: #d9534f; font-weight: bold; }
        .success { color: #5cb85c; }
    </style>
</head>
<body>
    <div class="card">
        <h1>GuardianWallet 🛡️</h1>
        <p>Secure Micro-Payments for Seniors</p>
        <input type="number" id="amount" placeholder="Amount ($)">
        <input type="text" id="recipient" placeholder="Recipient Name">
        <button onclick="handlePayment()">Send Money</button>
        
        <div id="history" style="margin-top: 20px;">
            <h3>Recent Activity</h3>
            <div id="log-list"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://your-backend-name.onrender.com/api"; // UPDATE THIS!

        async function handlePayment() {
            const amount = document.getElementById('amount').value;
            const recipient = document.getElementById('recipient').value;
            try {
                const res = await axios.post(`${API_URL}/pay`, { amount, recipient });
                alert(`Transaction ${res.data.status}! Risk Score: ${res.data.risk_score}`);
                loadHistory();
            } catch (e) { alert("Error connecting to security server."); }
        }

        async function loadHistory() {
            const res = await axios.get(`${API_URL}/history`);
            const list = document.getElementById('log-list');
            list.innerHTML = res.data.map(t => `
                <p class="${t.status === 'FLAGGED' ? 'flagged' : 'success'}">
                    $${t.amount} to ${t.recipient} - ${t.status}
                </p>
            `).join('');
        }
        loadHistory();
    </script>
</body>
</html>
