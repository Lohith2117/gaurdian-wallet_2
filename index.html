<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardianWallet 🛡️</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #f4f7f6; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        .stats-box { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .stats-box h2 { margin: 0; color: #007bff; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .flagged { color: #d9534f; font-weight: bold; border-left: 4px solid #d9534f; padding-left: 10px; background: #fff5f5; padding: 8px; border-radius: 0 4px 4px 0; }
        .success { color: #5cb85c; border-left: 4px solid #5cb85c; padding-left: 10px; background: #f9fff9; padding: 8px; border-radius: 0 4px 4px 0; }
        #status-msg { font-size: 0.8em; color: #666; text-align: center; margin-top: 10px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>GuardianWallet 🛡️</h1>
        <p>Secure Micro-Payments for Seniors</p>

        <div class="stats-box">
            <small>Total Outgoing (Today)</small>
            <h2 id="total-amount">$0.00</h2>
        </div>
        
        <input type="number" id="amount" placeholder="Amount ($)">
        <input type="text" id="recipient" placeholder="Recipient Name">
        <button onclick="handlePayment()">Send Money Safely</button>
        <div id="status-msg">System Secure & Active</div>
        
        <div id="history" style="margin-top: 30px;">
            <h3>Recent Activity</h3>
            <hr>
            <div id="log-list">Loading transactions...</div>
        </div>
    </div>

    <script>
        // CONFIGURATION
        const API_BASE_URL = "https://guardian-wallet-backend.onrender.com"; 
        const SECURE_PIN = "5050";

        async function handlePayment() {
            // 1. PIN CHALLENGE (Before any processing)
            const userPin = prompt("Confirm your 4-digit PIN to authorize this transfer:");
            
            if (userPin !== SECURE_PIN) {
                alert("❌ Unauthorized! Transaction blocked by Guardian Security.");
                return;
            }

            const amountInput = document.getElementById('amount');
            const recipientInput = document.getElementById('recipient');
            
            const amount = amountInput.value;
            const recipient = recipientInput.value;

            if(!amount || !recipient) {
                alert("Please fill in both fields.");
                return;
            }

            try {
                document.getElementById('status-msg').innerText = "Guardian AI is analyzing risk...";
                
                const res = await axios.post(`${API_BASE_URL}/api/pay`, { amount, recipient });
                
                if(res.data.status === 'FLAGGED') {
                    alert(`⚠️ WARNING: Transaction FLAGGED!\nRisk Score: ${res.data.risk_score}\nThis was logged for your safety.`);
                } else {
                    alert(`✅ Success: Money sent to ${recipient}`);
                }
                
                // Clear inputs
                amountInput.value = '';
                recipientInput.value = '';
                
                loadHistory();
            } catch (e) { 
                console.error("Payment Error:", e);
                alert("Security Server Error: Connection timed out."); 
            } finally {
                document.getElementById('status-msg').innerText = "System Secure & Active";
            }
        }

        async function loadHistory() {
            try {
                const res = await axios.get(`${API_BASE_URL}/api/history`);
                const list = document.getElementById('log-list');
                const totalDisplay = document.getElementById('total-amount');
                
                if (res.data.length === 0) {
                    list.innerHTML = "<p style='color:gray'>No transactions yet.</p>";
                    return;
                }

                // Calculate total spent
                let total = 0;
                list.innerHTML = res.data.map(t => {
                    // Only add successful/non-flagged to the total if you want, 
                    // or add everything to show volume:
                    total += parseFloat(t.amount);
                    
                    return `
                        <div class="${t.status === 'FLAGGED' ? 'flagged' : 'success'}" style="margin-bottom:12px;">
                            <strong>$${t.amount}</strong> to ${t.recipient} <br>
                            <small>Status: ${t.status} | Risk Score: ${t.risk_score}</small>
                        </div>
                    `;
                }).join('');

                totalDisplay.innerText = `$${total.toFixed(2)}`;

            } catch (e) { 
                console.error("History Load Error:", e);
                document.getElementById('log-list').innerHTML = "Error loading history.";
            }
        }

        // Initial load
        loadHistory();
    </script>
</body>
</html>
